name: Deploy to Cloudflare

# Scaffolded by the Worker↔GitHub connection pass.
# Worker source lives in: apps/worker
# Deploy steps are GATED on CLOUDFLARE_API_TOKEN: until that secret exists,
# this runs green and no-ops. Once set, it deploys via `wrangler deploy`.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    defaults:
      run:
        working-directory: apps/worker
    steps:
      - name: Check for deploy secret
        id: gate
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -n "$CF_TOKEN" ]; then echo "enabled=true" >> "$GITHUB_OUTPUT";
          else echo "enabled=false" >> "$GITHUB_OUTPUT"; echo "::notice::CLOUDFLARE_API_TOKEN not set — scaffolded, skipping deploy."; fi
      - name: Checkout
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/checkout@v4
      - name: Setup Node.js
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        if: steps.gate.outputs.enabled == 'true'
        run: |
          if [ -f package-lock.json ]; then npm ci || npm install;
          elif [ -f package.json ]; then npm install; else echo "no package.json"; fi
      - name: Build (if a build script exists)
        if: steps.gate.outputs.enabled == 'true'
        run: |
          if [ -f package.json ] && node -e "process.exit(require('./package.json').scripts?.build?0:1)"; then npm run build; else echo "no build script"; fi
      - name: Deploy to Cloudflare (with retry)
        if: steps.gate.outputs.enabled == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          for attempt in 1 2 3; do
            echo "::group::Deploy attempt $attempt"
            if npx --yes wrangler@latest deploy; then echo "::endgroup::"; echo "ok $attempt"; exit 0; fi
            echo "::endgroup::"; echo "retry in 15s"; sleep 15
          done
          echo "failed"; exit 1
